version: 2

models:
  - name: stg_race_results
    description: Staging table with core race results data
    columns:
      - name: Season
        description: F1 season year
        tests:
          - not_null
          - accepted_values:
              values: [2018, 2019, 2020, 2021, 2022, 2023, 2024]
      
      - name: Round
        description: Race round number in the season
        tests:
          - not_null
          - accepted_values:
              values: "{{ range(1, 25) }}"
      
      - name: Position
        description: Driver finishing position
        tests:
          - not_null
          - accepted_values:
              values: "{{ range(1, 23) }}"
      
      - name: Points
        description: Points scored by driver
        tests:
          - not_null
          - accepted_values:
              values: [0, 0.5, 1, 2, 3, 4, 5, 6, 7, 7.5, 8, 9, 10, 11, 12, 12.5, 13, 15, 16, 18, 19, 25, 26]

  - name: race_winners
    description: Race winners with details
    columns:
      - name: Season
        tests:
          - not_null
      - name: FullName
        tests:
          - not_null
      - name: Position
        tests:
          - accepted_values:
              values: [1]  # Must be position 1 (winner)

  - name: driver_season_stats
    description: Driver performance statistics by season
    columns:
      - name: Season
        tests:
          - not_null
      - name: FullName
        tests:
          - not_null
      - name: races
        tests:
          - not_null
          - accepted_values:
              values: "{{ range(1, 25) }}"  # Max 24 races per season
      - name: wins
        tests:
          - not_null
      - name: points
        tests:
          - not_null
      - name: avg_finish
        tests:
          - not_null

  - name: constructor_season_stats
    description: Constructor performance statistics by season
    columns:
      - name: Season
        tests:
          - not_null
      - name: TeamName
        tests:
          - not_null
      - name: races
        tests:
          - not_null
      - name: points
        tests:
          - not_null