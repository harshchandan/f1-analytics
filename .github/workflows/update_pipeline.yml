name: Update F1 Dataset

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # -------------------------
      # Run ingestion scripts
      # -------------------------

      - name: Fetch race results
        run: |
          python ingestion/fetch_race_results_2018.py
          python ingestion/fetch_race_results_2019.py
          python ingestion/fetch_race_results_2020.py
          python ingestion/fetch_race_results_2021.py
          python ingestion/fetch_race_results_2022.py
          python ingestion/fetch_race_results_2023.py
          python ingestion/fetch_race_results_2024.py

      # -------------------------
      # Combine raw datasets
      # -------------------------

      - name: Combine race results
        run: |
          python ingestion/combine_race_results.py

      # -------------------------
      # Run pipeline
      # -------------------------

      - name: Run pipeline
        run: |
          python run_pipeline.py

      # -------------------------
      # Commit updated data
      # -------------------------

      - name: Commit updated datasets
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Automated dataset update" || echo "No changes"
          git push